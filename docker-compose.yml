services:
  db:
    image: postgres:17-alpine
    container_name: landings_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: devjim
      POSTGRES_PASSWORD: devpwd
      POSTGRES_DB: landingspg
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devjim"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: landings_pgdata
