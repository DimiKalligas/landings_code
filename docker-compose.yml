services:
  db:
    image: postgres:17-alpine
    container_name: landings_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: devjim
      POSTGRES_PASSWORD: devpwd
      POSTGRES_DB: landingspg
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devjim -d landingspg"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: landings_app
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      # Mount source code for hot reload — node_modules and .next stay in container
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/lib/generated
    ports:
      # - "5433:5432"  # Docker Postgres on 5433, native stays on 5432
      - "3000:3000"
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    name: landings_pgdata
